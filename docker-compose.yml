services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Solo loopback: Prisma/`npm run dev` en el host la alcanzan vía localhost,
      # pero no queda expuesta a la red externa del VPS en producción.
      # Puerto host 5433 (no 5432) para no chocar con otros Postgres locales;
      # dentro de la red de Compose el servicio sigue siendo db:5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Dentro de la red de Compose el host de la db es el nombre del servicio,
      # no localhost (eso solo aplica a herramientas corriendo en el host).
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  backup:
    build: ./docker/backup
    restart: unless-stopped
    init: true # crond como PID 1 falla ("setpgid: Operation not permitted") sin un init real de por medio
    env_file: .env
    volumes:
      - backup_dumps:/backups
      - ./rclone.conf:/config/rclone/rclone.conf:ro
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  backup_dumps:
  caddy_data:
  caddy_config:
