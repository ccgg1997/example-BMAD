services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Solo loopback: Prisma/`npm run dev` en el host la alcanzan vía localhost,
      # pero no queda expuesta a la red externa del VPS en producción.
      # Puerto host 5433 (no 5432) para no chocar con otros Postgres locales;
      # dentro de la red de Compose el servicio sigue siendo db:5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
