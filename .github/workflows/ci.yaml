name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: domicilios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d domicilios"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/domicilios
      APP_PASSWORD: ci-test-password
      SESSION_SECRET: ci-test-session-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run test
